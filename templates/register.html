{% extends "base.html" %} 
{% block title %}Register{% endblock %} 
{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
  
  <!-- Register Form -->
  <div class="lg:col-span-5 lg:col-start-4">
    <div class="card-modern rounded-3xl p-8 lg:p-10">
      <!-- Logo/Brand -->
      <div class="text-center mb-8">
        <div class="w-16 h-16 rounded-2xl gradient-primary flex items-center justify-center text-white text-3xl font-bold shadow-lg shadow-indigo-200 mx-auto mb-4">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-black gradient-text">Create Account</h1>
        <p class="text-slate-400 text-sm mt-1">Join us and start managing your reminders</p>
      </div>

      <!-- Alert Messages -->
      <div id="msg" class="hidden rounded-2xl p-4 mb-6"></div>

      <form id="registerForm" onsubmit="event.preventDefault(); submitForm();" class="space-y-5">
        <!-- Full Name -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            Full Name
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
            </div>
            <input
              id="name"
              type="text"
              placeholder="John Doe"
              autocomplete="name"
              class="w-full pl-12 pr-4 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition placeholder:text-slate-400 text-slate-800"
              required
            />
          </div>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            Email Address
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
            </div>
            <input
              id="email"
              type="email"
              placeholder="your-email@example.com"
              autocomplete="email"
              class="w-full pl-12 pr-4 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition placeholder:text-slate-400 text-slate-800"
              required
            />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            Password
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
            </div>
            <input
              id="password"
              type="password"
              placeholder="enter password"
              autocomplete="new-password"
              class="w-full pl-12 pr-12 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition placeholder:text-slate-400 text-slate-800"
              required
              minlength="6"
            />
            <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center">
              <svg id="eyeIcon" class="w-5 h-5 text-slate-400 hover:text-slate-600 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>
        <!-- Submit Button -->
        <button
          type="submit"
          id="registerBtn"
          class="w-full py-4 rounded-2xl btn-primary text-base font-semibold flex items-center justify-center gap-2 group"
        >
          <span id="btnText">Create Account</span>
          <svg id="btnSpinner" class="hidden animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
          </svg>
        </button>
      </form>
      <!-- Login Link -->
      <p class="mt-6 text-center text-sm text-slate-500">
        Already have an account?
        <a href="/" class="text-indigo-600 font-semibold hover:text-indigo-700 hover:underline transition">
          Sign in here
        </a>
      </p>
    </div>
  </div>
</div>

<script>
function togglePassword() {
  const passwordInput = document.getElementById("password");
  const eyeIcon = document.getElementById("eyeIcon");
  
  if (passwordInput.type === "password") {
    passwordInput.type = "text";
    eyeIcon.innerHTML = `
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
    `;
  } else {
    passwordInput.type = "password";
    eyeIcon.innerHTML = `
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
    `;
  }
}

function showMsg(text, isError = true) {
  const msg = document.getElementById("msg");
  msg.classList.remove("hidden");
  msg.className = `rounded-2xl p-4 ${
    isError 
      ? "bg-red-50 text-red-700 border border-red-100" 
      : "bg-emerald-50 text-emerald-700 border border-emerald-100"
  }`;
  msg.textContent = text;
}

// Password strength checker
function checkPasswordStrength(password) {
  const lengthCheck = document.getElementById("lengthCheck");
  const letterCheck = document.getElementById("letterCheck");
  const numberCheck = document.getElementById("numberCheck");
  const strengthFill = document.getElementById("strengthFill");
  const strengthText = document.getElementById("strengthText");

  const hasLength = password.length >= 6;
  const hasLetter = /[a-zA-Z]/.test(password);
  const hasNumber = /[0-9]/.test(password);

  lengthCheck.className = `w-2 h-2 rounded-full ${hasLength ? 'bg-emerald-500' : 'bg-slate-300'}`;
  letterCheck.className = `w-2 h-2 rounded-full ${hasLetter ? 'bg-emerald-500' : 'bg-slate-300'}`;
  numberCheck.className = `w-2 h-2 rounded-full ${hasNumber ? 'bg-emerald-500' : 'bg-slate-300'}`;

  let strength = 0;
  if (hasLength) strength++;
  if (hasLetter) strength++;
  if (hasNumber) strength++;

  const colors = ['bg-slate-200', 'bg-red-400', 'bg-orange-400', 'bg-emerald-500'];
  const texts = ['Enter a password', 'Weak', 'Medium', 'Strong'];
  
  strengthFill.className = `h-full rounded-full transition-all duration-500 ${colors[strength]}`;
  strengthFill.style.width = `${(strength / 3) * 100}%`;
  strengthText.textContent = texts[strength];
  strengthText.className = `text-xs mt-1.5 ${strength >= 3 ? 'text-emerald-600' : strength >= 2 ? 'text-orange-500' : strength >= 1 ? 'text-red-500' : 'text-slate-400'}`;
}

// Password input listener
document.getElementById("password").addEventListener("input", function() {
  checkPasswordStrength(this.value);
});

async function submitForm() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  // Validation
  if (!name) {
    showMsg("Please enter your full name");
    document.getElementById("name").focus();
    return;
  }
  if (!email) {
    showMsg("Please enter your email address");
    document.getElementById("email").focus();
    return;
  }
  if (!password) {
    showMsg("Please enter a password");
    document.getElementById("password").focus();
    return;
  }
  if (password.length < 6) {
    showMsg("Password must be at least 6 characters");
    document.getElementById("password").focus();
    return;
  }
  // Show loading state
  const btn = document.getElementById("registerBtn");
  const btnText = document.getElementById("btnText");
  const spinner = document.getElementById("btnSpinner");
  btnText.textContent = "Creating account...";
  spinner.classList.remove("hidden");
  btn.disabled = true;

  try {
    const payload = { name, email, password };
    const res = await fetch("{%url 'api_register'%}", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const data = await res.json();

    if (res.ok) {
      localStorage.setItem("token", data.token);
      showMsg("Account created successfully! Redirecting...", false);
      setTimeout(() => {
        window.location.href = "/dashboard/";
      }, 500);
    } else {
      showMsg(data.error || "Registration failed. Please try again.");
      btnText.textContent = "Create Account";
      spinner.classList.add("hidden");
      btn.disabled = false;
    }
  } catch (error) {
    console.error("Registration error:", error);
    showMsg("Failed to connect. Please try again.");
    btnText.textContent = "Create Account";
    spinner.classList.add("hidden");
    btn.disabled = false;
  }
}

// Enter key support
document.getElementById("registerForm").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    submitForm();
  }
});

// Auto-focus on name field
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("name").focus();
});
</script>
{% endblock %}
