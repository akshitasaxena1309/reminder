{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <!-- Card -->
    <div class="card-modern rounded-3xl p-8">
      <!-- Header -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-100 mb-4">
          <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-black gradient-text">Forgot Password</h1>
        <p class="text-slate-400 text-sm mt-1" id="stepDescription">Enter your email to receive an OTP</p>
      </div>

      <!-- Alert Messages -->
      <div id="msg" class="hidden rounded-2xl p-4 mb-6"></div>

      <!-- Step 1: Email Form -->
      <div id="step1">
        <form onsubmit="event.preventDefault(); sendOTP();" class="space-y-6">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">
              Email Address
            </label>
            <input id="email" type="email" 
              placeholder="your-email@example.com"
              class="w-full px-4 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition placeholder:text-slate-400 text-slate-800">
          </div>

          <button type="submit"
            id="sendOtpBtn"
            class="w-full px-6 py-4 rounded-2xl text-base font-semibold flex items-center justify-center gap-2 text-white transition-all duration-300"
            style="background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);"
            onmouseover="this.style.transform='scale(1.02)'; this.style.boxShadow='0 8px 25px rgba(79, 70, 229, 0.5)'"
            onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 4px 15px rgba(79, 70, 229, 0.4)'">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            Send OTP
          </button>
        </form>
      </div>

      <!-- Step 2: OTP Verification -->
      <div id="step2" class="hidden">
        <form onsubmit="event.preventDefault(); verifyOTP();" class="space-y-6">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">
              Enter OTP
            </label>
            <div class="flex gap-3 justify-center">
              <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition text-slate-800">
              <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition text-slate-800">
              <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition text-slate-800">
              <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition text-slate-800">
              <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition text-slate-800">
              <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition text-slate-800">
            </div>
            <p class="text-xs text-slate-400 text-center mt-3">
              Enter the 6-digit code sent to <span id="otpEmailDisplay" class="font-semibold text-slate-600"></span>
            </p>
          </div>

          <div class="flex gap-3">
            <button type="button"
              onclick="goToStep(1)"
              class="flex-1 px-4 py-3.5 rounded-2xl bg-slate-100 hover:bg-slate-200 text-slate-600 text-sm font-semibold transition-all">
              Back
            </button>
            <button type="submit"
              id="verifyOtpBtn"
              class="flex-1 px-4 py-3.5 rounded-2xl text-sm font-semibold text-white transition-all duration-300"
              style="background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);"
              onmouseover="this.style.transform='scale(1.02)'; this.style.boxShadow='0 8px 25px rgba(79, 70, 229, 0.5)'"
              onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 4px 15px rgba(79, 70, 229, 0.4)'">
              Verify OTP
            </button>
          </div>

          <p class="text-center text-sm text-slate-500">
            Didn't receive code? 
            <button type="button" onclick="resendOTP()" class="text-indigo-600 hover:text-indigo-700 font-semibold transition-colors">
              Resend OTP
            </button>
          </p>
        </form>
      </div>

      <!-- Step 3: Reset Password -->
      <div id="step3" class="hidden">
        <form onsubmit="event.preventDefault(); resetPassword();" class="space-y-6">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">
              New Password
            </label>
            <div class="relative">
              <input id="newPassword" type="password" 
                placeholder="Enter new password"
                class="w-full px-4 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition placeholder:text-slate-400 text-slate-800 pr-12">
              <button type="button" onclick="togglePassword('newPassword')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
            <p class="text-xs text-slate-400 mt-2">Password must be at least 8 characters</p>
          </div>

          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">
              Confirm Password
            </label>
            <div class="relative">
              <input id="confirmPassword" type="password" 
                placeholder="Confirm new password"
                class="w-full px-4 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition placeholder:text-slate-400 text-slate-800 pr-12">
              <button type="button" onclick="togglePassword('confirmPassword')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="flex gap-3">
            <button type="button"
              onclick="goToStep(2)"
              class="flex-1 px-4 py-3.5 rounded-2xl bg-slate-100 hover:bg-slate-200 text-slate-600 text-sm font-semibold transition-all">
              Back
            </button>
            <button type="submit"
              id="resetPasswordBtn"
              class="flex-1 px-4 py-3.5 rounded-2xl text-sm font-semibold text-white transition-all duration-300"
              style="background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);"
              onmouseover="this.style.transform='scale(1.02)'; this.style.boxShadow='0 8px 25px rgba(79, 70, 229, 0.5)'"
              onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 4px 15px rgba(79, 70, 229, 0.4)'">
              Reset Password
            </button>
          </div>
        </form>
      </div>

      <!-- Footer Links -->
      <div class="mt-6 text-center">
        <p class="text-sm text-slate-500">
          Remember your password? 
          <a href="{%url 'login_page'%}" class="text-indigo-600 hover:text-indigo-700 font-semibold transition-colors">
            Sign In
          </a>
        </p>
      </div>
    </div>
  </div>
</div>

<script>
// Store email and OTP for verification
let userEmail = '';
let otpToken = '';

// OTP input auto-focus
document.querySelectorAll('.otp-input').forEach((input, index, inputs) => {
  input.addEventListener('input', (e) => {
    if (e.target.value.length === 1 && index < inputs.length - 1) {
      inputs[index + 1].focus();
    }
  });
  
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && index > 0 && !e.target.value) {
      inputs[index - 1].focus();
    }
  });
});

function togglePassword(id) {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
}

function showMsg(text, isError = true) {
  const msg = document.getElementById("msg");
  msg.classList.remove("hidden");
  msg.className = `rounded-2xl p-4 ${
    isError 
      ? "bg-red-50 text-red-700 border border-red-100" 
      : "bg-emerald-50 text-emerald-700 border border-emerald-100"
  }`;
  msg.textContent = text;
  setTimeout(() => {
    msg.classList.add("hidden");
  }, 5000);
}

function goToStep(step) {
  document.getElementById('step1').classList.toggle('hidden', step !== 1);
  document.getElementById('step2').classList.toggle('hidden', step !== 2);
  document.getElementById('step3').classList.toggle('hidden', step !== 3);
  
  const descriptions = {
    1: 'Enter your email to receive an OTP',
    2: 'Enter the OTP sent to your email',
    3: 'Create a new password for your account'
  };
  document.getElementById('stepDescription').textContent = descriptions[step];
  
  // Clear any previous messages
  document.getElementById('msg').classList.add('hidden');
}

// Step 1: Send OTP
async function sendOTP() {
  const email = document.getElementById('email').value.trim();
  
  if (!email) {
    showMsg('Please enter your email address');
    document.getElementById('email').focus();
    return;
  }
  
  if (!isValidEmail(email)) {
    showMsg('Please enter a valid email address');
    document.getElementById('email').focus();
    return;
  }

  const btn = document.getElementById('sendOtpBtn');
  const originalText = btn.innerHTML;
  
  // Show loading state
  btn.disabled = true;
  btn.innerHTML = `
    <svg class="animate-spin w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    Sending...
  `;
  btn.style.opacity = '0.8';

  try {
    const res = await fetch("{%url 'forget_password'%}", {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (!res.ok) {
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.innerHTML = originalText;
      return showMsg(data.error || 'Failed to send OTP');
    }

    // Store email for later use
    userEmail = email;
    otpToken = data.token; // Store token if returned from backend
    
    // Show OTP step
    document.getElementById('otpEmailDisplay').textContent = email;
    goToStep(2);
    showMsg('OTP sent successfully! Check your email.', false);
    
    btn.disabled = false;
    btn.style.opacity = '1';
    btn.innerHTML = originalText;
    
  } catch (error) {
    console.error('Error sending OTP:', error);
    btn.disabled = false;
    btn.style.opacity = '1';
    btn.innerHTML = originalText;
    showMsg('Failed to send OTP. Please try again.');
  }
}

// Step 2: Verify OTP
async function verifyOTP() {
  // Get OTP from inputs
  const inputs = document.querySelectorAll('.otp-input');
  let otp = '';
  inputs.forEach(input => otp += input.value);
  
  if (otp.length !== 6) {
    showMsg('Please enter the complete 6-digit OTP');
    return;
  }

  const btn = document.getElementById('verifyOtpBtn');
  const originalText = btn.innerHTML;
  
  // Show loading state
  btn.disabled = true;
  btn.innerHTML = `
    <svg class="animate-spin w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    Verifying...
  `;
  btn.style.opacity = '0.8';

  try {
    const res = await fetch("{%url 'verify_otp'%}", {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        email: userEmail, 
        otp: otp,
      })
    });

    const data = await res.json();

    if (!res.ok) {
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.innerHTML = originalText;
      return showMsg(data.error || 'Invalid OTP. Please try again.');
    }

    // Store verification token for password reset
    otpToken = data.token || otpToken;
    
    // Go to reset password step
    goToStep(3);
    showMsg('OTP verified! Set your new password.', false);
    
    btn.disabled = false;
    btn.style.opacity = '1';
    btn.innerHTML = originalText;
    
  } catch (error) {
    console.error('Error verifying OTP:', error);
    btn.disabled = false;
    btn.style.opacity = '1';
    btn.innerHTML = originalText;
    showMsg('Failed to verify OTP. Please try again.');
  }
}

// Step 3: Reset Password
async function resetPassword() {
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  
  if (!newPassword) {
    showMsg('Please enter a new password');
    document.getElementById('newPassword').focus();
    return;
  }
  
  if (newPassword.length < 8) {
    showMsg('Password must be at least 8 characters');
    document.getElementById('newPassword').focus();
    return;
  }
  
  if (newPassword !== confirmPassword) {
    showMsg('Passwords do not match');
    document.getElementById('confirmPassword').focus();
    return;
  }

  const btn = document.getElementById('resetPasswordBtn');
  const originalText = btn.innerHTML;
  
  // Show loading state
  btn.disabled = true;
  btn.innerHTML = `
    <svg class="animate-spin w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    Resetting...
  `;
  btn.style.opacity = '0.8';

  try {
    const res = await fetch("{%url 'update_password'%}", {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        email: userEmail,
        password: newPassword 
      })
    });

    const data = await res.json();

    if (!res.ok) {
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.innerHTML = originalText;
      return showMsg(data.error || 'Failed to reset password');
    }

    // Success - redirect to login
    showMsg('Password reset successfully! Redirecting to login...', false);
    
    setTimeout(() => {
      window.location.href = '/';
    }, 2000);
    
  } catch (error) {
    console.error('Error resetting password:', error);
    btn.disabled = false;
    btn.style.opacity = '1';
    btn.innerHTML = originalText;
    showMsg('Failed to reset password. Please try again.');
  }
}

// Resend OTP
async function resendOTP() {
  if (!userEmail) {
    showMsg('Please enter your email first');
    return;
  }
  
  showMsg('Resending OTP...', false);
  
  try {
    const res = await fetch("{%url 'forget_password'%}", {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: userEmail })
    });

    const data = await res.json();

    if (!res.ok) {
      return showMsg(data.error || 'Failed to resend OTP');
    }

    otpToken = data.token;
    // Clear OTP inputs
    document.querySelectorAll('.otp-input').forEach(input => input.value = '');
    document.querySelector('.otp-input').focus();
    showMsg('OTP resent successfully! Check your email.', false);
    
  } catch (error) {
    console.error('Error resending OTP:', error);
    showMsg('Failed to resend OTP. Please try again.');
  }
}

function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

// Initialize - show step 1
goToStep(1);
</script>
{% endblock %}
